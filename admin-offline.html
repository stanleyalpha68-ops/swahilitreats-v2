<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Swahili Treats Admin — Offline</title>
<meta name="theme-color" content="#ff006e" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #fffbea; font-family: "Quicksand", sans-serif; color: #22223b;
    padding: 2rem; text-align: center;
  }
  .card { max-width: 380px; }
  .icon { font-size: 3.5rem; margin-bottom: 1rem; }
  h1 { font-family: "Fredoka", cursive; color: #ff006e; font-size: 1.4rem; margin: 0 0 0.6rem; }
  p { color: #6b6b80; line-height: 1.5; margin: 0 0 1.5rem; }
  button {
    background: #ff006e; color: #fff; border: none; border-radius: 1.25rem;
    padding: 0.9rem 1.8rem; font-family: "Quicksand", sans-serif; font-weight: 700;
    font-size: 0.95rem; cursor: pointer; min-height: 48px;
  }
  button:active { transform: scale(0.97); }
  .hint { margin-top: 1.2rem; font-size: 0.8rem; color: #a0a0b0; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page hasn't been visited yet, so there's nothing saved to show. The Admin dashboard you already had open will keep working from its own cache — this offline page only appears for a page you haven't opened before.</p>
    <button onclick="window.location.href='/admin.html'">Go to Dashboard</button>
    <div class="hint">We'll reconnect automatically once you're back online.</div>
  </div>
  <script>
    window.addEventListener("online", () => { window.location.href = "/admin.html"; });
  </script>
</body>
</html>
